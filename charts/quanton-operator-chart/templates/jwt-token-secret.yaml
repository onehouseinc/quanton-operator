{{- if .Values.onehouseConfig.authToken }}
apiVersion: v1
kind: Secret
metadata:
  name: onehouse-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quanton-spark.labels" . | nindent 4 }}
    app.kubernetes.io/component: jwt-token
  annotations:
    description: "JWT token for operator (managed by JWTTokenManager)"
type: Opaque
data:
  JWT_TOKEN: {{ .Values.onehouseConfig.authToken | b64enc | quote }}
{{- end }}

