{{- if not (and .Values.onehouseConfig.mtls .Values.onehouseConfig.mtls.clientCert .Values.onehouseConfig.mtls.clientKey) }}
# Service for DP Proxy (gRPC communication with control plane)
apiVersion: v1
kind: Service
metadata:
  name: dp-proxy-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: dp-proxy
    app.kubernetes.io/component: dp-proxy
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dp-proxy
    app.kubernetes.io/component: dp-proxy
  ports:
  - name: grpc
    port: 8091
    targetPort: 8091
    protocol: TCP
{{- end }}
