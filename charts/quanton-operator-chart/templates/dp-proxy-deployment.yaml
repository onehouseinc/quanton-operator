{{- if not (and .Values.onehouseConfig.mtls .Values.onehouseConfig.mtls.clientCert .Values.onehouseConfig.mtls.clientKey) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dp-proxy-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: dp-proxy
    app.kubernetes.io/component: dp-proxy
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dp-proxy
      app.kubernetes.io/component: dp-proxy
  template:
    metadata:
      {{- with .Values.quantonOperator.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: dp-proxy
        app.kubernetes.io/component: dp-proxy
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    spec:
      serviceAccountName: {{ .Values.quantonOperator.serviceAccount.name | default "quanton-operator" }}

      {{- if .Values.onehouseConfig.imagePullSecrets.accessToken }}
      imagePullSecrets:
        - name: onehouse-docker-registry-secret
      {{- end }}

      # DP Proxy sidecar (for secure gRPC communication with control plane)
      # Always enabled - degrades gracefully if gateway controller is unreachable
      containers:
      - name: dp-proxy
        image: onehouseai/dp-proxy:release-v0.8.0
        imagePullPolicy: IfNotPresent

        args:
          - /usr/local/bin/envoy
          - -c
          - /etc/envoy/envoy.yaml
          - --log-level
          - info

        ports:
        - name: grpc
          containerPort: 8091
          protocol: TCP
        - name: admin
          containerPort: 9901
          protocol: TCP
        {{- if .Values.onehouseConfig.metricsEndpoint }}
        - name: metrics-fwd
          containerPort: 8093
          protocol: TCP
        {{- end }}

        # Health check via TCP (port is listening and ready to accept connections)
        livenessProbe:
          tcpSocket:
            port: 8091
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        readinessProbe:
          tcpSocket:
            port: 8091
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        resources:
          requests:
            cpu: "300m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        volumeMounts:
        - name: dp-proxy-config
          mountPath: /etc/envoy
          readOnly: true
        {{- if and .Values.onehouseConfig .Values.onehouseConfig.endpoint .Values.onehouseConfig.mtls .Values.onehouseConfig.mtls.clientCert .Values.onehouseConfig.mtls.clientKey }}
        - name: mutual-tls
          mountPath: /mnt/mutual-tls
          readOnly: true
        {{- end }}

      volumes:
      - name: dp-proxy-config
        configMap:
          name: dp-proxy-envoy-config
          defaultMode: 0644
      {{- if and .Values.onehouseConfig .Values.onehouseConfig.mtls }}
      - name: mutual-tls
        secret:
          secretName: mutual-tls-secret
          defaultMode: 0444
      {{- end }}

      {{- with .Values.quantonOperator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - dp-proxy
              topologyKey: kubernetes.io/hostname
{{- end }}
