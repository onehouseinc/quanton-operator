apiVersion: v1
kind: ConfigMap
metadata:
  name: dp-proxy-envoy-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: onehouse-quanton-operator
    app.kubernetes.io/component: dp-proxy
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
data:
  envoy.yaml: |
    # Envoy configuration for DP Proxy sidecar
    # Routes operator gRPC traffic to control plane gateway controller
    static_resources:
      listeners:
      - name: listener_0
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8091
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: auto
              stream_idle_timeout: 0s
              route_config:
                name: local_route
                virtual_hosts:
                - name: local_service
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: gateway_controller
                      timeout: 1200s
                      max_stream_duration:
                        grpc_timeout_header_max: 1200s
              http_filters:
              - name: envoy.filters.http.grpc_http1_bridge
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_http1_bridge.v3.Config
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      {{- if .Values.onehouseConfig.metricsEndpoint }}
      - name: metrics_listener
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8093
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: metrics_ingress
              route_config:
                name: metrics_route
                virtual_hosts:
                - name: metrics_service
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: metrics_endpoint
                      timeout: 60s
                      host_rewrite_literal: {{ .Values.onehouseConfig.metricsEndpoint | regexFind "^[^:]+" }}
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      {{- end }}

      clusters:
      - name: gateway_controller
        connect_timeout: 60s
        type: logical_dns
        dns_lookup_family: V4_ONLY
        http2_protocol_options: {}
        upstream_connection_options:
          tcp_keepalive:
            keepalive_time: 300
        lb_policy: round_robin
        health_checks:
        - timeout: 10s
          interval: 30s
          no_traffic_interval: 60s
          unhealthy_threshold: 3
          healthy_threshold: 2
          tcp_health_check: {}
        load_assignment:
          cluster_name: gateway_controller
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: {{ .Values.onehouseConfig.endpoint | regexFind "^[^:]+" }}
                    port_value: {{ .Values.onehouseConfig.endpoint | regexFind ":(\\d+)$" | regexFind "\\d+" | int }}

        {{- if and .Values.onehouseConfig .Values.onehouseConfig.endpoint .Values.onehouseConfig.mtls .Values.onehouseConfig.mtls.clientCert .Values.onehouseConfig.mtls.clientKey }}
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: {{ .Values.onehouseConfig.endpoint | regexFind "^[^:]+" }}
            max_session_keys: 0
            common_tls_context:
              tls_certificates:
              - certificate_chain:
                  filename: /mnt/mutual-tls/client-cert.pem
                private_key:
                  filename: /mnt/mutual-tls/client-key.pem
              validation_context:
                match_typed_subject_alt_names:
                - san_type: DNS
                  matcher:
                    exact: {{ .Values.onehouseConfig.endpoint | regexFind "^[^:]+" }}
                trusted_ca:
                  filename: /etc/ssl/certs/ca-certificates.crt
        {{- end }}

      {{- if .Values.onehouseConfig.metricsEndpoint }}
      - name: metrics_endpoint
        connect_timeout: 60s
        type: logical_dns
        dns_lookup_family: V4_ONLY
        health_checks:
        - timeout: 10s
          interval: 30s
          no_traffic_interval: 60s
          unhealthy_threshold: 3
          healthy_threshold: 2
          tcp_health_check: {}
        load_assignment:
          cluster_name: metrics_endpoint
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: {{ .Values.onehouseConfig.metricsEndpoint | regexFind "^[^:]+" }}
                    port_value: {{ .Values.onehouseConfig.metricsEndpoint | regexFind ":(\\d+)$" | regexFind "\\d+" | int }}

        {{- if and .Values.onehouseConfig .Values.onehouseConfig.mtls .Values.onehouseConfig.mtls.clientCert .Values.onehouseConfig.mtls.clientKey }}
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: {{ .Values.onehouseConfig.metricsEndpoint | regexFind "^[^:]+" }}
            max_session_keys: 0
            common_tls_context:
              tls_certificates:
              - certificate_chain:
                  filename: /mnt/mutual-tls/client-cert.pem
                private_key:
                  filename: /mnt/mutual-tls/client-key.pem
              validation_context:
                match_typed_subject_alt_names:
                - san_type: DNS
                  matcher:
                    exact: {{ .Values.onehouseConfig.metricsEndpoint | regexFind "^[^:]+" }}
                trusted_ca:
                  filename: /etc/ssl/certs/ca-certificates.crt
        {{- end }}
      {{- end }}

    admin:
      access_log_path: /tmp/admin_access.log
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8092
