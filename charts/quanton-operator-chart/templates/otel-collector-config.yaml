apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: onehouse-quanton-operator
    app.kubernetes.io/component: otel-collector
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      prometheus/ksm:
        config:
          scrape_configs:
            - job_name: 'kube-state-metrics'
              scrape_interval: 60s
              static_configs:
                - targets: ['localhost:8082']

    processors:
      batch:
        send_batch_size: 100
        timeout: 10s

      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 128

      filter/ksm:
        error_mode: ignore
        metrics:
          datapoint:
            {{- if .Values.quantonOperator.jobNamespaces }}
            {{- $nsParts := list }}
            {{- range .Values.quantonOperator.jobNamespaces }}
            {{- $nsParts = append $nsParts (printf "attributes[\"namespace\"] == \"%s\"" .) }}
            {{- end }}
            - 'not ({{ join " or " $nsParts }})'
            {{- end }}
            - 'metric.name == "kube_pod_status_phase" and value_double == 0'

    exporters:
      otlp/operator:
        endpoint: localhost:4320
        tls:
          insecure: true
        compression: none
        sending_queue:
          enabled: true
          storage: file_storage/queue
          num_consumers: 1
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 60s
          max_elapsed_time: 0s

    extensions:
      health_check:
        endpoint: :13133

      file_storage/queue:
        directory: /var/log/otel-queue
        timeout: 10s

    service:
      extensions: [health_check, file_storage/queue]
      pipelines:
        metrics:
          receivers: [prometheus/ksm]
          processors: [memory_limiter, filter/ksm, batch]
          exporters: [otlp/operator]
