---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: quantonsparkapplications.quantonsparkoperator.onehouse.ai
spec:
  group: quantonsparkoperator.onehouse.ai
  names:
    kind: QuantonSparkApplication
    listKind: QuantonSparkApplicationList
    plural: quantonsparkapplications
    shortNames:
    - qsa
    singular: quantonsparkapplication
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Status
      type: string
    - jsonPath: .status.sparkApplicationName
      name: App
      type: string
    - jsonPath: .status.tokenStatus
      name: Token Status
      type: string
    - jsonPath: .status.tokenTimeUntilExpiry
      name: Token Expires In
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta2
    schema:
      openAPIV3Schema:
        description: QuantonSparkApplication is the Schema for the quantonsparkapplications
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              QuantonSparkApplicationSpec defines the desired state of QuantonSparkApplication.
              It wraps the upstream Kubeflow SparkApplication spec with OneHouse-specific enhancements.
            properties:
              sparkApplicationSpec:
                description: |-
                  SparkApplicationSpec is the full spec of the upstream Kubeflow SparkApplication CRD.
                  This field accepts any valid SparkApplication spec and passes it through to create
                  the underlying SparkApplication. The operator enhances this spec with JWT token
                  management and other OneHouse-specific configurations.

                  Example spec structure (follows sparkoperator.k8s.io/v1beta2 SparkApplication spec):
                    type: Scala
                    mode: cluster
                    image: spark:3.5.1
                    mainClass: org.apache.spark.examples.SparkPi
                    mainApplicationFile: local:///opt/spark/examples/jars/spark-examples_2.12-3.5.1.jar
                    driver:
                      cores: 1
                      memory: "1g"
                    executor:
                      cores: 1
                      instances: 2
                      memory: "1g"
                type: object
                x-kubernetes-preserve-unknown-fields: true
            required:
            - sparkApplicationSpec
            type: object
          status:
            description: QuantonSparkApplicationStatus defines the observed state
              of QuantonSparkApplication.
            properties:
              certificateExpiresAt:
                description: CertificateExpiresAt is the timestamp when the mTLS certificate
                  expires.
                format: date-time
                type: string
              certificateStatus:
                description: |-
                  CertificateStatus indicates the health of the mTLS certificate (Healthy, Approaching, Urgent, Expired).
                  Healthy: > 7 days remaining
                  Approaching: 1-7 days remaining
                  Urgent: < 1 day remaining
                  Expired: Certificate has expired
                type: string
              certificateTimeUntilExpiry:
                description: CertificateTimeUntilExpiry is a human-readable string
                  showing time remaining until certificate expiration.
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the QuantonSparkApplication's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              message:
                description: Message provides additional details about the current
                  status.
                type: string
              phase:
                description: Phase represents the current phase of the Spark application
                  (Pending, Submitted, Running, Completed, Failed).
                type: string
              sparkApplicationName:
                description: SparkApplicationName is the name of the SparkApplication
                  CRD created by this QuantonSparkApplication.
                type: string
              sparkJobID:
                description: SparkJobID is the UUID of the Spark job created in the
                  Control Plane (empty if not registered or integration disabled).
                type: string
              sparkJobRunID:
                description: SparkJobRunID is the UUID of the current Spark job run
                  (empty if no run has been submitted).
                type: string
              tokenExpiresAt:
                description: TokenExpiresAt is the timestamp when the JWT token expires
                  (from JWT exp claim).
                format: date-time
                type: string
              tokenStatus:
                description: |-
                  TokenStatus indicates the health of the JWT token (Healthy, Approaching, Urgent, Expired).
                  Healthy: > 24 hours remaining
                  Approaching: 12-24 hours remaining
                  Urgent: < 12 hours remaining
                  Expired: Token has expired
                type: string
              tokenTimeUntilExpiry:
                description: TokenTimeUntilExpiry is a human-readable string showing
                  time remaining until token expiration (e.g., "8.5 hours", "2 days").
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
