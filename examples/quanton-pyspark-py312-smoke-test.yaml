apiVersion: v1
kind: ConfigMap
metadata:
  name: pyspark-py312-smoke-test-script
  namespace: default
data:
  pyspark-py312-smoke-test.py: |
    #!/usr/bin/env python3
    # Requires Python 3.12+ — uses PEP 695 type alias syntax (SyntaxError on Python 3.11)
    from pyspark.sql import SparkSession
    from pyspark.sql.functions import sum as spark_sum

    # PEP 695 type alias — new keyword `type` introduced in Python 3.12.
    # This line is a SyntaxError on Python 3.11 and earlier.
    type Row = tuple[str, int]

    spark = SparkSession.builder.appName("PySpark-Py312-Smoke-Test").getOrCreate()

    data: list[Row] = [("alice", 10), ("bob", 20), ("carol", 30)]
    df = spark.createDataFrame(data, ["name", "value"])

    total = df.agg(spark_sum("value")).collect()[0][0]
    assert total == 60, f"Expected 60, got {total}"
    print(f"Test 1 PASSED: sum = {total}")

    df.createOrReplaceTempView("people")
    result = spark.sql("SELECT name FROM people ORDER BY name").collect()
    assert [r.name for r in result] == ["alice", "bob", "carol"]
    print(f"Test 2 PASSED: names = {[r.name for r in result]}")

    print("ALL TESTS PASSED")
    spark.stop()
---
apiVersion: quantonsparkoperator.onehouse.ai/v1beta2
kind: QuantonSparkApplication
metadata:
  name: quanton-pyspark-py312-smoke-test
  namespace: default
spec:
  sparkApplicationSpec:
    type: Python
    mode: cluster
    image: "dist.onehouse.ai/onehouseai/quanton-spark:quanton-operator-release-v0.2.0-al2023-quanton-operator"
    imagePullPolicy: IfNotPresent
    mainApplicationFile: "local:///mnt/scripts/pyspark-py312-smoke-test.py"
    sparkVersion: "3.5.0"
    restartPolicy:
      type: Never
    volumes:
      - name: scripts
        configMap:
          name: pyspark-py312-smoke-test-script
    driver:
      cores: 1
      memory: "1024m"
      labels:
        version: "3.5.0"
      serviceAccount: spark-operator-spark
      envVars:
        PYSPARK_PYTHON: "/usr/bin/python3.12"
        PYSPARK_DRIVER_PYTHON: "/usr/bin/python3.12"
      volumeMounts:
        - name: scripts
          mountPath: /mnt/scripts
    executor:
      cores: 1
      instances: 1
      memory: "1024m"
      labels:
        version: "3.5.0"
      envVars:
        PYSPARK_PYTHON: "/usr/bin/python3.12"
      volumeMounts:
        - name: scripts
          mountPath: /mnt/scripts
