# QuantonSparkApplication that runs all 99 TPC-DS queries against the data
# generated by the benchmark suite, with the Quanton AI Agent enabled.
#
# The Spark UI's bottom-right sidebar gives you a Chat / Recommendations /
# Diagnostics / Monitor view backed by an in-pod LLM agent that can reason
# about the live job (stages, tasks, SQL plans, executor metrics).
#
# This file expects the PVC `tpcds-data` and the three TPC-DS ConfigMaps
# (`tpcds-scripts`, `tpcds-sql-queries`, `tpcds-sql-ddl`) to already exist —
# the orchestration script `run.sh` in this directory creates them for you.
apiVersion: quantonsparkoperator.onehouse.ai/v1beta2
kind: QuantonSparkApplication
metadata:
  name: quanton-tpcds-agent
  namespace: default
spec:
  sparkApplicationSpec:
    type: Python
    mode: cluster
    image: "dist.onehouse.ai/onehouseai/quanton-spark:quanton-operator-release-v0.2.0-al2023"
    imagePullPolicy: IfNotPresent
    mainApplicationFile: "local:///mnt/scripts/run_queries.py"
    arguments:
      - "--sql-dir"
      - "/mnt/sql/tpcds"
      - "--parquet-dir"
      - "/data/tpcds/sf_${SCALE_FACTOR}/parquet"
      - "--output-file"
      - "/data/tpcds/sf_${SCALE_FACTOR}/results/quanton-parquet.json"
    sparkVersion: "3.5.0"
    sparkConf:
      # Agent plugin (sidebar in the Spark UI). If you installed the operator
      # with --set onehouseConfig.enableAIAgent=true, the controller injects
      # these automatically and you can drop this whole block.
      spark.plugins: "ai.quanton.spark.agent.SparkAgentPlugin"
      spark.quanton.agent.enabled: "true"
    restartPolicy:
      type: Never
    volumes:
      - name: tpcds-data
        persistentVolumeClaim:
          claimName: tpcds-data
      - name: scripts
        configMap:
          name: tpcds-scripts
      - name: sql-tpcds
        configMap:
          name: tpcds-sql-queries
      - name: sql-ddl
        configMap:
          name: tpcds-sql-ddl
    driver:
      cores: 2
      coreLimit: "2000m"
      memory: "6144m"
      labels:
        version: "3.5.0"
      serviceAccount: spark-operator-spark
      volumeMounts:
        - { name: tpcds-data, mountPath: /data/tpcds }
        - { name: scripts,    mountPath: /mnt/scripts }
        - { name: sql-tpcds,  mountPath: /mnt/sql/tpcds }
        - { name: sql-ddl,    mountPath: /mnt/sql/ddl }
    executor:
      cores: 1
      instances: 6
      memory: "1536m"
      labels:
        version: "3.5.0"
      volumeMounts:
        - { name: tpcds-data, mountPath: /data/tpcds }
        - { name: scripts,    mountPath: /mnt/scripts }
        - { name: sql-tpcds,  mountPath: /mnt/sql/tpcds }
        - { name: sql-ddl,    mountPath: /mnt/sql/ddl }
