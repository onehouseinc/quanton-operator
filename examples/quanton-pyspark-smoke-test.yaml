apiVersion: v1
kind: ConfigMap
metadata:
  name: pyspark-smoke-test-script
  namespace: default
data:
  pyspark-smoke-test.py: |
    #!/usr/bin/env python3
    from pyspark.sql import SparkSession
    from pyspark.sql.functions import col, sum as spark_sum

    spark = SparkSession.builder.appName("PySpark-Smoke-Test").getOrCreate()

    # Test 1: basic DataFrame
    data = [("alice", 10), ("bob", 20), ("carol", 30)]
    df = spark.createDataFrame(data, ["name", "value"])
    total = df.agg(spark_sum("value")).collect()[0][0]
    assert total == 60, f"Expected 60, got {total}"
    print(f"Test 1 PASSED: sum = {total}")

    # Test 2: SparkSQL
    df.createOrReplaceTempView("people")
    result = spark.sql("SELECT name, value * 2 AS doubled FROM people ORDER BY name").collect()
    assert len(result) == 3
    print(f"Test 2 PASSED: sql rows = {[r.name for r in result]}")

    print("ALL TESTS PASSED")
    spark.stop()
---
apiVersion: quantonsparkoperator.onehouse.ai/v1beta2
kind: QuantonSparkApplication
metadata:
  name: quanton-pyspark-smoke-test
  namespace: default
spec:
  sparkApplicationSpec:
    type: Python
    mode: cluster
    image: "dist.onehouse.ai/onehouseai/quanton-spark:release-v0.206.0-al2023"
    imagePullPolicy: IfNotPresent
    mainApplicationFile: "local:///mnt/scripts/pyspark-smoke-test.py"
    sparkVersion: "3.5.0"
    restartPolicy:
      type: Never
    volumes:
      - name: scripts
        configMap:
          name: pyspark-smoke-test-script
    driver:
      cores: 1
      memory: "1024m"
      labels:
        version: "3.5.0"
      serviceAccount: spark-operator-spark
      volumeMounts:
        - name: scripts
          mountPath: /mnt/scripts
    executor:
      cores: 1
      instances: 1
      memory: "1024m"
      labels:
        version: "3.5.0"
      volumeMounts:
        - name: scripts
          mountPath: /mnt/scripts
